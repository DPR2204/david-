<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Dice left -->
  <rect x="120" y="100" width="45" height="45" rx="5" />
  <circle cx="133" cy="113" r="3" fill="#1A1A1A" />
  <circle cx="152" cy="113" r="3" fill="#1A1A1A" />
  <circle cx="133" cy="132" r="3" fill="#1A1A1A" />
  <circle cx="152" cy="132" r="3" fill="#1A1A1A" />
  <!-- Dice right (tilted) -->
  <g transform="rotate(-15, 200, 120)">
    <rect x="185" y="100" width="40" height="40" rx="4" />
    <circle cx="205" cy="112" r="2.5" fill="#1A1A1A" />
    <circle cx="205" cy="128" r="2.5" fill="#1A1A1A" />
    <circle cx="195" cy="120" r="2.5" fill="#1A1A1A" />
  </g>
  <!-- Puzzle piece -->
  <path d="M280 90 L310 90 Q310 80 320 80 Q330 80 330 90 L360 90 L360 120 Q370 120 370 130 Q370 140 360 140 L360 160 L280 160 L280 140 Q270 140 270 130 Q270 120 280 120 Z" stroke-width="1.5" />
  <!-- Crossword mini grid -->
  <rect x="400" y="85" width="30" height="30" stroke-width="1" />
  <rect x="430" y="85" width="30" height="30" stroke-width="1" fill="#1A1A1A" opacity="0.08" />
  <rect x="460" y="85" width="30" height="30" stroke-width="1" />
  <rect x="400" y="115" width="30" height="30" stroke-width="1" fill="#1A1A1A" opacity="0.08" />
  <rect x="430" y="115" width="30" height="30" stroke-width="1" />
  <rect x="460" y="115" width="30" height="30" stroke-width="1" fill="#1A1A1A" opacity="0.08" />
  <rect x="400" y="145" width="30" height="30" stroke-width="1" />
  <rect x="430" y="145" width="30" height="30" stroke-width="1" fill="#1A1A1A" opacity="0.08" />
  <rect x="460" y="145" width="30" height="30" stroke-width="1" />
  <!-- Letters in grid -->
  <text x="410" y="107" font-family="serif" font-size="14" fill="#1A1A1A" opacity="0.4" text-anchor="middle">C</text>
  <text x="480" y="107" font-family="serif" font-size="14" fill="#1A1A1A" opacity="0.4" text-anchor="middle">F</text>
  <text x="450" y="137" font-family="serif" font-size="14" fill="#1A1A1A" opacity="0.4" text-anchor="middle">A</text>
  <text x="410" y="167" font-family="serif" font-size="14" fill="#1A1A1A" opacity="0.4" text-anchor="middle">É</text>
  <!-- Pencil -->
  <line x1="500" y1="170" x2="530" y2="80" stroke-width="2" />
  <path d="M530 80 L532 74 L526 78 Z" fill="#1A1A1A" />
  <line x1="500" y1="170" x2="498" y2="172" stroke-width="3" opacity="0.3" />
</svg>
